<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="stylesheet" href="index.css">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>P5 with Typescript and Vite</title>
</head>
<body class="bg-black">
    <div class="bg-green-300 w-50 h-60">
        <div class="bg-amber-300 h-5 w-full"></div>
        <img class="h-full w-full" src="/gnom-1.png" alt="">
    </div>
    <div class="w-full" id="sketch"></div>
    <div class="bg-pink-200"><h2 class="text-center font-bold text-3xl">P5 with Typescript Tailwindcss and Vite</h2></div>
    <div class="flex justify-around">
        <button id="clearButton" class="bg-pink-600 text-3xl px-4 py-2 rounded-full hover:scale-125 active:scale-90 transition-transform duration-200 " >Click me to clear</button>
        <button id="gnomeButton"
            class="bg-blue-400 text-3xl px-4 py-2 rounded-full hover:scale-125 active:scale-90 transition-transform duration-200">Spawn gnome</button>
        <button
            id="spawnButton" class="bg-blue-400 text-3xl px-4 py-2 rounded-full hover:scale-125 active:scale-90 transition-transform duration-200">        Click me to spawn random rect</button>
        <div class="bg-yellow-300 w-50 h-50 text-pink-400 font-bold text-4xl flex justify-center items-center">Cooler text</div>

        <script type="module" src="/src/main.ts"></script>

    </div>
</body>
</html>
